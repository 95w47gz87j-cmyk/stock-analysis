<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A股技术分析</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<style>
/* ===== CSS 变量 ===== */
:root {
  --bg-primary: #0d1117;
  --bg-secondary: #161b22;
  --bg-tertiary: #21262d;
  --border: #30363d;
  --text-primary: #c9d1d9;
  --text-secondary: #8b949e;
  --up: #ef5350;
  --down: #26a69a;
  --accent: #58a6ff;
  --sidebar-w: 250px;
  --header-h: 48px;
  --toolbar-h: 36px;
  --font: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg-primary);
  color: var(--text-primary);
  font-family: var(--font);
  font-size: 14px;
  height: 100vh;
  overflow: hidden;
  user-select: none;
}

/* ===== 布局 ===== */
#app {
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* 顶部栏 */
#header {
  height: var(--header-h);
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 16px;
  flex-shrink: 0;
}

.logo {
  font-size: 18px;
  font-weight: 700;
  color: var(--accent);
  white-space: nowrap;
  letter-spacing: 1px;
}

/* 搜索 */
#search-container {
  position: relative;
  flex: 0 1 320px;
}

#search-input {
  width: 100%;
  height: 32px;
  padding: 0 12px;
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text-primary);
  font-size: 13px;
  outline: none;
  transition: border-color 0.2s;
}
#search-input:focus { border-color: var(--accent); }
#search-input::placeholder { color: var(--text-secondary); }

#search-dropdown {
  position: absolute;
  top: 36px;
  left: 0;
  right: 0;
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: 6px;
  max-height: 300px;
  overflow-y: auto;
  z-index: 100;
  display: none;
}

.search-item {
  display: flex;
  justify-content: space-between;
  padding: 8px 12px;
  cursor: pointer;
  transition: background 0.15s;
}
.search-item:hover { background: var(--bg-tertiary); }
.search-code { color: var(--accent); font-weight: 600; font-size: 13px; }
.search-name { color: var(--text-primary); font-size: 13px; }
.search-empty, .search-error { padding: 16px; text-align: center; color: var(--text-secondary); font-size: 13px; }
.search-error { color: var(--up); }

/* 行情栏 */
#quote-bar {
  display: flex;
  align-items: center;
  gap: 20px;
  margin-left: auto;
  white-space: nowrap;
}
.quote-price { font-size: 22px; font-weight: 700; }
.quote-change { font-size: 14px; font-weight: 600; padding: 2px 8px; border-radius: 4px; }
.quote-change.up { color: #fff; background: var(--up); }
.quote-change.down { color: #fff; background: var(--down); }
.quote-detail { font-size: 12px; color: var(--text-secondary); }

/* 主体 */
#main {
  display: flex;
  flex: 1;
  min-height: 0;
}

/* 侧边栏 */
#sidebar {
  width: var(--sidebar-w);
  background: var(--bg-secondary);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  overflow: hidden;
}

.sidebar-header {
  padding: 12px 14px;
  font-size: 13px;
  font-weight: 700;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 1px;
  border-bottom: 1px solid var(--border);
}

#watchlist {
  flex: 1;
  overflow-y: auto;
}

.watchlist-item {
  display: flex;
  flex-wrap: wrap;
  padding: 10px 14px;
  cursor: pointer;
  border-left: 3px solid transparent;
  transition: all 0.15s;
  border-bottom: 1px solid rgba(48,54,61,0.3);
}
.watchlist-item:hover { background: var(--bg-tertiary); }
.watchlist-item.active {
  border-left-color: var(--accent);
  background: rgba(88,166,255,0.06);
}
.wl-name { font-size: 14px; font-weight: 600; width: 50%; }
.wl-code { font-size: 11px; color: var(--text-secondary); width: 50%; text-align: right; }
.wl-price { font-size: 14px; font-weight: 600; margin-top: 4px; }
.wl-change { font-size: 12px; margin-top: 4px; margin-left: 8px; }

/* 图表区域 */
#chart-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
}

/* 工具栏 */
#toolbar {
  height: var(--toolbar-h);
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 12px;
  gap: 8px;
  flex-shrink: 0;
}

.toolbar-group { display: flex; align-items: center; gap: 4px; }
.toolbar-divider { width: 1px; height: 18px; background: var(--border); margin: 0 6px; }

.period-btn, .ma-chip, .bb-chip {
  height: 26px;
  padding: 0 10px;
  border: 1px solid var(--border);
  border-radius: 4px;
  background: var(--bg-tertiary);
  color: var(--text-secondary);
  font-size: 12px;
  cursor: pointer;
  transition: all 0.15s;
  font-family: var(--font);
  white-space: nowrap;
}
.period-btn:hover, .ma-chip:hover, .bb-chip:hover {
  border-color: var(--text-secondary);
  color: var(--text-primary);
}
.period-btn.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}
.ma-chip.active { border-color: var(--accent); color: var(--accent); }
.bb-chip.active { border-color: #ce93d8; color: #ce93d8; }

/* 图表容器 */
#chart-container {
  flex: 1;
  min-height: 0;
}

/* 错误横幅 */
#error-banner {
  display: none;
  align-items: center;
  justify-content: center;
  gap: 12px;
  background: rgba(239,83,80,0.15);
  border-bottom: 1px solid rgba(239,83,80,0.3);
  padding: 6px 16px;
  font-size: 13px;
  color: var(--up);
  flex-shrink: 0;
}
#error-banner button {
  height: 24px;
  padding: 0 12px;
  border: 1px solid var(--up);
  border-radius: 4px;
  background: transparent;
  color: var(--up);
  cursor: pointer;
  font-size: 12px;
  font-family: var(--font);
}
#error-banner button:hover { background: rgba(239,83,80,0.2); }

/* 底部提示 */
#footer-hint {
  height: 24px;
  background: var(--bg-secondary);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  color: var(--text-secondary);
  gap: 16px;
  flex-shrink: 0;
}
#footer-hint kbd {
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 1px 6px;
  font-size: 10px;
  color: var(--accent);
  font-family: var(--font);
}

/* 滚动条 */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-secondary); }

/* Loading */
.loading-placeholder {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: var(--text-secondary);
  font-size: 15px;
}
.loading-placeholder::before {
  content: '';
  width: 20px;
  height: 20px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin-right: 10px;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="app">
  <!-- 顶部栏 -->
  <div id="header">
    <div class="logo">📈 A股技术分析</div>
    <div id="search-container">
      <input id="search-input" type="text" placeholder="搜索股票 — 输入代码 / 名称 / 拼音" autocomplete="off">
      <div id="search-dropdown"></div>
    </div>
    <div id="quote-bar">
      <span class="quote-price" id="qp-price">--</span>
      <span class="quote-change" id="qp-change">--</span>
      <span class="quote-detail" id="qp-detail">--</span>
    </div>
  </div>

  <!-- 错误横幅 -->
  <div id="error-banner"></div>

  <!-- 主体 -->
  <div id="main">
    <!-- 侧边栏 -->
    <div id="sidebar">
      <div class="sidebar-header">⭐ 自选股</div>
      <div id="watchlist"></div>
    </div>

    <!-- 图表 -->
    <div id="chart-area">
      <div id="toolbar">
        <span class="toolbar-group">
          <button class="period-btn active" data-klt="101">日K</button>
          <button class="period-btn" data-klt="102">周K</button>
          <button class="period-btn" data-klt="103">月K</button>
        </span>
        <span class="toolbar-divider"></span>
        <span class="toolbar-group">
          <button class="ma-chip active" data-ma="5">MA5</button>
          <button class="ma-chip active" data-ma="10">MA10</button>
          <button class="ma-chip active" data-ma="20">MA20</button>
          <button class="ma-chip active" data-ma="60">MA60</button>
          <button class="ma-chip" data-ma="120">MA120</button>
          <button class="ma-chip" data-ma="250">MA250</button>
        </span>
        <span class="toolbar-divider"></span>
        <button class="bb-chip" id="bb-toggle">布林带</button>
      </div>
      <div id="chart-container">
        <div class="loading-placeholder">加载中…</div>
      </div>
    </div>
  </div>

  <!-- 底部提示 -->
  <div id="footer-hint">
    <span><kbd>/</kbd> 搜索</span>
    <span><kbd>← →</kbd> 平移</span>
    <span><kbd>滚轮</kbd> 缩放</span>
    <span><kbd>点击</kbd> 股票切换</span>
  </div>
</div>

<script>
(function() {
'use strict';

/* ================================================================
   Section A: 常量配置
   ================================================================ */

const WATCHLIST = [
  { code: '600519', market: 1, name: '贵州茅台' },
  { code: '000858', market: 0, name: '五粮液' },
  { code: '300750', market: 0, name: '宁德时代' },
  { code: '000001', market: 0, name: '平安银行' },
  { code: '601318', market: 1, name: '中国平安' },
  { code: '600036', market: 1, name: '招商银行' },
  { code: '002594', market: 0, name: '比亚迪' },
  { code: '601012', market: 1, name: '隆基绿能' },
  { code: '600276', market: 1, name: '恒瑞医药' },
  { code: '000333', market: 0, name: '美的集团' },
  { code: '600900', market: 1, name: '长江电力' },
  { code: '688981', market: 1, name: '中芯国际' },
  { code: '601727', market: 1, name: '上海电气' },
  { code: '601899', market: 1, name: '紫金矿业' },
  { code: '002415', market: 0, name: '海康威视' },
  { code: '600030', market: 1, name: '中信证券' },
];

const COL = {
  UP: '#ef5350', DOWN: '#26a69a',
  BG: '#0d1117', CARD: '#161b22', SURFACE: '#21262d', BORDER: '#30363d',
  TEXT: '#c9d1d9', TEXT2: '#8b949e',
  MA5: '#fdd835', MA10: '#42a5f5', MA20: '#ce93d8', MA60: '#ff8a65',
  MA120: '#80cbc4', MA250: '#ffab40',
  DIF: '#fdd835', DEA: '#42a5f5',
  HIST_UP: '#ef5350', HIST_DOWN: '#26a69a',
  RSI: '#ce93d8',
  BB: 'rgba(206,147,216,0.4)',
  BB_FILL: 'rgba(206,147,216,0.06)',
};

const ALL_MA = [5, 10, 20, 60, 120, 250];
const DEFAULT_MA = new Set([5, 10, 20, 60]);

/* ================================================================
   Section B: Store 状态管理
   ================================================================ */

const Store = {
  _state: {
    stock: WATCHLIST[0],
    period: 101,        // 101=日K, 102=周K, 103=月K
    kline: [],
    quote: null,
    indicators: null,
    visibleMA: new Set(DEFAULT_MA),
    showBB: false,
    loading: false,
    error: null,
    searchResults: [],
  },
  _subs: {},

  get(k) { return this._state[k]; },

  set(k, v) {
    this._state[k] = v;
    if (this._subs[k]) this._subs[k].forEach(fn => fn(v));
  },

  on(k, fn) {
    if (!this._subs[k]) this._subs[k] = [];
    this._subs[k].push(fn);
  },

  async selectStock(stock) {
    this.set('loading', true);
    this.set('error', null);
    this.set('stock', stock);
    try {
      const [kline, quote] = await Promise.all([
        API.fetchKline(stock.code, stock.market, this._state.period),
        API.fetchQuote(stock.code, stock.market),
      ]);
      this.set('kline', kline);
      this.set('quote', quote);
      const ind = Indicators.calcAll(kline);
      this.set('indicators', ind);
    } catch (e) {
      this.set('error', e.message);
    } finally {
      this.set('loading', false);
    }
  },

  async setPeriod(klt) {
    this.set('period', klt);
    this.set('loading', true);
    this.set('error', null);
    try {
      const stock = this._state.stock;
      const kline = await API.fetchKline(stock.code, stock.market, klt);
      this.set('kline', kline);
      const ind = Indicators.calcAll(kline);
      this.set('indicators', ind);
    } catch (e) {
      this.set('error', e.message);
    } finally {
      this.set('loading', false);
    }
  },
};

/* ================================================================
   Section C: API 层
   ================================================================ */

const API = {
  secid(code, market) { return `${market}.${code}`; },

  // 判断市场: SH=1, SZ=0
  detectMarket(code) {
    return /^60|^688/.test(code) ? 1 : 0;
  },

  async fetchKline(code, market, klt) {
    const key = `${code}_${klt}`;
    const cached = API._cache.get(key);
    if (cached && (Date.now() - cached.time < 60000)) return cached.data;

    const url = 'https://push2his.eastmoney.com/api/qt/stock/kline/get';
    const params = new URLSearchParams({
      secid: this.secid(code, market),
      fields1: 'f1,f2,f3,f4,f5,f6',
      fields2: 'f51,f52,f53,f54,f55,f56,f57,f58,f59,f60,f61',
      klt: String(klt),
      fqt: '1',
      end: '20500101',
      lmt: '500',
    });

    const resp = await fetch(`${url}?${params}`);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}: K线数据请求失败`);
    const json = await resp.json();
    if (!json.data || !json.data.klines || json.data.klines.length === 0) {
      throw new Error('未找到K线数据，请检查股票代码');
    }

    const data = json.data.klines.map(line => {
      const p = line.split(',');
      return {
        date:   p[0],
        open:   parseFloat(p[1]),
        close:  parseFloat(p[2]),
        high:   parseFloat(p[3]),
        low:    parseFloat(p[4]),
        volume: parseFloat(p[5]),
        amount: parseFloat(p[6]),
        amplitude: parseFloat(p[7]),
        changePct: parseFloat(p[8]),
        change:    parseFloat(p[9]),
        turnover:  parseFloat(p[10]),
      };
    });

    API._cache.set(key, { data, time: Date.now() });
    return data;
  },

  async fetchQuote(code, market) {
    const url = 'https://push2.eastmoney.com/api/qt/stock/get';
    const params = new URLSearchParams({
      secid: this.secid(code, market),
      fields: 'f43,f44,f45,f46,f47,f48,f57,f58,f60,f168,f169,f170',
    });

    const resp = await fetch(`${url}?${params}`);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}: 行情数据请求失败`);
    const json = await resp.json();
    if (!json.data) throw new Error('行情数据为空');

    const d = json.data;
    // 东方财富 push2 API: f43/f44/f45/f46/f60/f170 返回分(x100), f169=%, f47=手, f48=元
    const div100 = (v) => (v != null) ? v / 100 : null;

    return {
      price:     div100(d.f43),
      high:      div100(d.f44),
      low:       div100(d.f45),
      open:      div100(d.f46),
      volume:    d.f47,        // 手
      amount:    d.f48,        // 元
      code:      d.f57,
      name:      d.f58,
      prevClose: div100(d.f60),
      changePct: d.f169 != null ? d.f169 : 0,
      change:    d.f170 != null ? div100(d.f170) : 0,
      turnover:  d.f168 != null ? d.f168 : null,
    };
  },

  async searchStocks(query) {
    if (query.length < 1) return [];
    const url = 'https://searchapi.eastmoney.com/api/suggest/get';
    const params = new URLSearchParams({
      input: query,
      type: '14',
      token: 'D43BF722C8E33BDC906FB84A85E326E8',
      count: '10',
    });

    const resp = await fetch(`${url}?${params}`);
    if (!resp.ok) return [];
    const json = await resp.json();
    const list = json.QuotationCodeTable?.Data || [];
    return list
      .filter(item => item.SecurityTypeName === 'A股' || item.MktNum)
      .map(item => ({
        code: item.Code,
        market: (item.MktNum === '1' || item.MktNum === 1) ? 1 : 0,
        name: item.Name,
      }));
  },

  _cache: new Map(),
};

/* ================================================================
   Section D: 技术指标计算引擎
   ================================================================ */

const Indicators = {

  calcSMA(values, period) {
    const out = new Array(values.length).fill(null);
    if (values.length < period) return out;
    let sum = 0;
    for (let i = 0; i < period; i++) sum += values[i];
    out[period - 1] = sum / period;
    for (let i = period; i < values.length; i++) {
      sum += values[i] - values[i - period];
      out[i] = sum / period;
    }
    return out;
  },

  calcEMA(values, period) {
    const out = new Array(values.length).fill(null);
    if (values.length < period) return out;
    const k = 2 / (period + 1);
    // 用 SMA 做种子
    let sum = 0;
    for (let i = 0; i < period; i++) sum += values[i];
    out[period - 1] = sum / period;
    for (let i = period; i < values.length; i++) {
      out[i] = values[i] * k + out[i - 1] * (1 - k);
    }
    return out;
  },

  calcMACD(data) {
    const closes = data.map(d => d.close);
    const ema12 = this.calcEMA(closes, 12);
    const ema26 = this.calcEMA(closes, 26);
    const len = data.length;
    const dif  = new Array(len).fill(null);
    const dea  = new Array(len).fill(null);
    const hist = new Array(len).fill(null);

    const start = 25; // EMA26 从 index 25 开始有效
    for (let i = start; i < len; i++) {
      if (ema12[i] != null && ema26[i] != null) dif[i] = ema12[i] - ema26[i];
    }

    // DEA = EMA9 of DIF
    const difSlice = dif.slice(start);
    const deaSlice = this.calcEMA(difSlice, 9);
    for (let i = 0; i < deaSlice.length; i++) {
      if (deaSlice[i] != null) dea[start + i] = deaSlice[i];
    }

    for (let i = 0; i < len; i++) {
      if (dif[i] != null && dea[i] != null) hist[i] = (dif[i] - dea[i]) * 2;
    }
    return { dif, dea, hist };
  },

  calcRSI(data, period = 14) {
    const len = data.length;
    const out = new Array(len).fill(null);
    if (len < period + 1) return out;

    const changes = [];
    for (let i = 1; i < len; i++) changes.push(data[i].close - data[i-1].close);

    // 种子: 前 N 个的平均涨/跌
    let avgGain = 0, avgLoss = 0;
    for (let i = 0; i < period; i++) {
      if (changes[i] > 0) avgGain += changes[i];
      else avgLoss += Math.abs(changes[i]);
    }
    avgGain /= period;
    avgLoss /= period;

    const rs0 = avgLoss === 0 ? 100 : avgGain / avgLoss;
    out[period] = 100 - 100 / (1 + rs0);

    // Wilder 平滑
    for (let i = period; i < changes.length; i++) {
      const c = changes[i];
      const g = c > 0 ? c : 0;
      const l = c < 0 ? Math.abs(c) : 0;
      avgGain = (avgGain * (period - 1) + g) / period;
      avgLoss = (avgLoss * (period - 1) + l) / period;
      const rs = avgLoss === 0 ? 100 : avgGain / avgLoss;
      out[i + 1] = 100 - 100 / (1 + rs);
    }
    return out;
  },

  calcBB(data, period = 20, mult = 2) {
    const closes = data.map(d => d.close);
    const middle = this.calcSMA(closes, period);
    const upper  = new Array(data.length).fill(null);
    const lower  = new Array(data.length).fill(null);

    for (let i = period - 1; i < data.length; i++) {
      let sumSq = 0;
      for (let j = 0; j < period; j++) {
        sumSq += Math.pow(closes[i - j] - middle[i], 2);
      }
      const std = Math.sqrt(sumSq / period);
      upper[i] = middle[i] + mult * std;
      lower[i] = middle[i] - mult * std;
    }
    return { middle, upper, lower };
  },

  calcAll(data) {
    const closes = data.map(d => d.close);
    const vols = data.map(d => d.volume);

    const ma = {};
    ALL_MA.forEach(p => { ma['ma' + p] = this.calcSMA(closes, p); });

    const macd = this.calcMACD(data);
    const rsi = this.calcRSI(data);
    const bb = this.calcBB(data);
    const volMA5  = this.calcSMA(vols, 5);
    const volMA10 = this.calcSMA(vols, 10);
    const turnoverRates = data.map(d => d.turnover);
    const turnoverMA5 = this.calcSMA(turnoverRates, 5);

    return { ma, macd, rsi, bb, volMA5, volMA10, turnoverRates, turnoverMA5 };
  },
};

/* ================================================================
   Section E: 图表管理 (单一 ECharts 实例, 4 Grid)
   ================================================================ */

const ChartManager = {
  chart: null,

  init() {
    const dom = document.getElementById('chart-container');
    dom.innerHTML = ''; // 清掉 loading placeholder
    this.chart = echarts.init(dom, 'dark');
    window.addEventListener('resize', () => this.chart && this.chart.resize());
    // 初始空态
    this.chart.setOption(this._emptyOption());
  },

  _emptyOption() {
    return {
      title: { text: '请选择股票', left: 'center', top: 'center',
        textStyle: { color: COL.TEXT2, fontSize: 16, fontWeight: 'normal' } },
    };
  },

  update(data, indicators, visibleMA, showBB) {
    if (!data || data.length === 0) return;
    const dates = data.map(d => d.date);
    const ohlc  = data.map(d => [d.open, d.close, d.low, d.high]);
    const vols  = data.map(d => d.volume);

    // 涨跌颜色
    const volColors = data.map((d, i) => {
      if (i === 0) return COL.UP;
      return d.close >= d.open ? COL.UP : COL.DOWN;
    });

    // 构建 series
    const series = [];

    // --- Grid 0: K 线 + MA + BB ---
    series.push({
      name: 'K线', type: 'candlestick', data: ohlc, xAxisIndex: 0, yAxisIndex: 0,
      itemStyle: { color: COL.UP, color0: COL.DOWN, borderColor: COL.UP, borderColor0: COL.DOWN },
    });

    ALL_MA.forEach(p => {
      const key = 'ma' + p;
      if (visibleMA.has(p) && indicators.ma[key]) {
        const colors = { 5: COL.MA5, 10: COL.MA10, 20: COL.MA20, 60: COL.MA60, 120: COL.MA120, 250: COL.MA250 };
        series.push({
          name: `MA${p}`, type: 'line', data: indicators.ma[key],
          xAxisIndex: 0, yAxisIndex: 0, symbol: 'none',
          lineStyle: { width: 1.2, color: colors[p] || COL.TEXT2 },
        });
      }
    });

    if (showBB && indicators.bb) {
      const bb = indicators.bb;
      series.push(
        { name: 'BOLL上', type: 'line', data: bb.upper, xAxisIndex: 0, yAxisIndex: 0, symbol: 'none', lineStyle: { width: 1, color: COL.BB, type: 'dashed' } },
        { name: 'BOLL中', type: 'line', data: bb.middle, xAxisIndex: 0, yAxisIndex: 0, symbol: 'none', lineStyle: { width: 1, color: '#ff8a65' } },
        { name: 'BOLL下', type: 'line', data: bb.lower, xAxisIndex: 0, yAxisIndex: 0, symbol: 'none', lineStyle: { width: 1, color: COL.BB, type: 'dashed' },
          areaStyle: { color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [{offset:0,color:'rgba(206,147,216,0.12)'},{offset:1,color:'rgba(206,147,216,0.01)'}]) } },
      );
    }

    // --- Grid 1: 成交量 ---
    series.push({
      name: '成交量', type: 'bar', xAxisIndex: 1, yAxisIndex: 1,
      data: vols.map((v, i) => ({ value: v, itemStyle: { color: volColors[i] } })),
    });
    if (indicators.volMA5) series.push({ name: 'VOL MA5', type: 'line', data: indicators.volMA5, xAxisIndex: 1, yAxisIndex: 1, symbol: 'none', lineStyle: { width: 1, color: COL.MA5 } });
    if (indicators.volMA10) series.push({ name: 'VOL MA10', type: 'line', data: indicators.volMA10, xAxisIndex: 1, yAxisIndex: 1, symbol: 'none', lineStyle: { width: 1, color: COL.MA10 } });

    // --- Grid 2: MACD ---
    const macd = indicators.macd;
    series.push(
      { name: 'DIF', type: 'line', data: macd.dif, xAxisIndex: 2, yAxisIndex: 2, symbol: 'none', lineStyle: { width: 1.2, color: COL.DIF } },
      { name: 'DEA', type: 'line', data: macd.dea, xAxisIndex: 2, yAxisIndex: 2, symbol: 'none', lineStyle: { width: 1.2, color: COL.DEA } },
      { name: 'MACD柱', type: 'bar', xAxisIndex: 2, yAxisIndex: 2,
        data: macd.hist.map(v => v == null ? null : ({ value: v, itemStyle: { color: v >= 0 ? COL.HIST_UP : COL.HIST_DOWN } })) },
    );

    // --- Grid 4: 换手率 ---
    series.push({
      name: '换手率', type: 'bar', xAxisIndex: 4, yAxisIndex: 4,
      data: indicators.turnoverRates ? indicators.turnoverRates.map(v => v == null ? null : ({ value: v, itemStyle: { color: v >= 5 ? 'rgba(239,83,80,0.5)' : v >= 2 ? 'rgba(255,171,64,0.5)' : 'rgba(88,166,255,0.4)' } })) : [],
    });
    if (indicators.turnoverMA5) series.push({
      name: '换手MA5', type: 'line', data: indicators.turnoverMA5, xAxisIndex: 4, yAxisIndex: 4, symbol: 'none', lineStyle: { width: 1.2, color: '#ffab40' },
    });

    // --- Grid 3: RSI ---
    series.push({
      name: 'RSI(14)', type: 'line', data: indicators.rsi, xAxisIndex: 3, yAxisIndex: 3,
      symbol: 'none', lineStyle: { width: 1.5, color: COL.RSI },
      markLine: { silent: true, symbol: 'none', lineStyle: { type: 'dashed', width: 1 },
        data: [
          { yAxis: 70, lineStyle: { color: COL.UP }, label: { formatter: '超买 70', color: COL.UP, fontSize: 11 } },
          { yAxis: 30, lineStyle: { color: COL.DOWN }, label: { formatter: '超卖 30', color: COL.DOWN, fontSize: 11 } },
        ] },
      markArea: { silent: true,
        data: [
          [{ yAxis: 70, itemStyle: { color: 'rgba(239,83,80,0.04)' } }, { yAxis: 100 }],
          [{ yAxis: 0,  itemStyle: { color: 'rgba(38,166,154,0.04)' } }, { yAxis: 30 }],
        ] },
    });

    const option = {
      backgroundColor: COL.BG,
      animation: false,
      grid: [
        { left: 60, right: 16, top: 8,  height: '42%' },
        { left: 60, right: 16, top: '52%', height: '8%'  },
        { left: 60, right: 16, top: '62%', height: '10%' },
        { left: 60, right: 16, top: '74%', height: '10%' },
        { left: 60, right: 16, top: '86%', height: '10%' },
      ],
      xAxis: [
        { type: 'category', data: dates, gridIndex: 0, axisLabel: { color: COL.TEXT2, fontSize: 10 }, axisLine: { lineStyle: { color: COL.BORDER } }, axisTick: { show: false }, splitLine: { show: false } },
        { type: 'category', data: dates, gridIndex: 1, axisLabel: { show: false }, axisLine: { show: false }, axisTick: { show: false }, splitLine: { show: false } },
        { type: 'category', data: dates, gridIndex: 2, axisLabel: { color: COL.TEXT2, fontSize: 10 }, axisLine: { lineStyle: { color: COL.BORDER } }, axisTick: { show: false }, splitLine: { show: false } },
        { type: 'category', data: dates, gridIndex: 3, axisLabel: { color: COL.TEXT2, fontSize: 10 }, axisLine: { lineStyle: { color: COL.BORDER } }, axisTick: { show: false }, splitLine: { show: false } },
        { type: 'category', data: dates, gridIndex: 4, axisLabel: { color: COL.TEXT2, fontSize: 10 }, axisLine: { lineStyle: { color: COL.BORDER } }, axisTick: { show: false }, splitLine: { show: false } },
      ],
      yAxis: [
        { type: 'value', scale: true, gridIndex: 0, axisLabel: { color: COL.TEXT2, fontSize: 10 }, splitLine: { lineStyle: { color: COL.BORDER, opacity: 0.3 } }, position: 'left' },
        { type: 'value', gridIndex: 1, axisLabel: { color: COL.TEXT2, fontSize: 9, formatter: v => v >= 1e8 ? (v/1e8).toFixed(1)+'亿' : (v/1e4).toFixed(0)+'万' }, splitLine: { lineStyle: { color: COL.BORDER, opacity: 0.2 } }, position: 'left' },
        { type: 'value', scale: true, gridIndex: 2, axisLabel: { color: COL.TEXT2, fontSize: 9 }, splitLine: { lineStyle: { color: COL.BORDER, opacity: 0.2 } }, position: 'left', splitNumber: 4 },
        { type: 'value', min: 0, max: 100, gridIndex: 3, axisLabel: { color: COL.TEXT2, fontSize: 9 }, splitLine: { lineStyle: { color: COL.BORDER, opacity: 0.2 } }, position: 'left' },
        { type: 'value', gridIndex: 4, axisLabel: { color: COL.TEXT2, fontSize: 9, formatter: v => v.toFixed(1) + '%' }, splitLine: { lineStyle: { color: COL.BORDER, opacity: 0.2 } }, position: 'left' },
      ],
      series,
      tooltip: {
        trigger: 'axis',
        axisPointer: { type: 'cross' },
      },
      dataZoom: [
        { type: 'inside', xAxisIndex: [0, 1, 2, 3, 4], start: 60, end: 100, zoomOnMouseWheel: true, moveOnMouseMove: true },
        { type: 'slider', xAxisIndex: [0, 1, 2, 3, 4], bottom: 0, height: 22, borderColor: COL.BORDER,
          backgroundColor: COL.CARD, fillerColor: 'rgba(88,166,255,0.1)',
          dataBackground: { lineStyle: { color: COL.TEXT2 }, areaStyle: { color: COL.TEXT2, opacity: 0.1 } },
          selectedDataBackground: { lineStyle: { color: COL.MA10 }, areaStyle: { color: COL.MA10, opacity: 0.15 } },
          textStyle: { color: COL.TEXT2, fontSize: 10 } },
      ],
    };

    this.chart.setOption(option, true);
  },

  showLoading(txt) {
    this.chart && this.chart.showLoading({ text: txt || '加载中…', color: COL.MA10, textColor: COL.TEXT, maskColor: 'rgba(13,17,23,0.75)', fontSize: 14 });
  },
  hideLoading() {
    this.chart && this.chart.hideLoading();
  },
};

// ---- 搜索框 ----
const SearchBox = {
  _input: null, _dropdown: null, _timer: null,

  init() {
    this._input = document.getElementById('search-input');
    this._dropdown = document.getElementById('search-dropdown');

    this._input.addEventListener('input', () => {
      clearTimeout(this._timer);
      const q = this._input.value.trim();
      if (!q) { this._dropdown.style.display = 'none'; return; }
      this._timer = setTimeout(() => this._doSearch(q), 300);
    });

    this._input.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') this._dropdown.style.display = 'none';
      if (e.key === 'Enter') {
        const first = this._dropdown.querySelector('.search-item');
        if (first) first.click();
      }
    });

    this._input.addEventListener('focus', () => {
      if (Store.get('searchResults').length > 0) this._dropdown.style.display = 'block';
    });

    document.addEventListener('click', (e) => {
      if (!e.target.closest('#search-container')) this._dropdown.style.display = 'none';
    });

    // / 快捷键聚焦搜索
    document.addEventListener('keydown', (e) => {
      if (e.key === '/' && document.activeElement !== this._input) {
        e.preventDefault();
        this._input.focus();
        this._input.select();
      }
    });
  },

  async _doSearch(q) {
    try {
      const results = await API.searchStocks(q);
      Store.set('searchResults', results);
      this._render(results);
    } catch {
      this._render([], true);
    }
  },

  _render(results, error) {
    if (error) {
      this._dropdown.innerHTML = '<div class="search-error">搜索失败，请重试</div>';
    } else if (results.length === 0) {
      this._dropdown.innerHTML = '<div class="search-empty">未找到匹配股票</div>';
    } else {
      this._dropdown.innerHTML = results.map(r =>
        `<div class="search-item" data-code="${r.code}" data-market="${r.market}">
          <span class="search-code">${r.code}</span>
          <span class="search-name">${r.name}</span>
        </div>`
      ).join('');

      this._dropdown.querySelectorAll('.search-item').forEach(el => {
        el.addEventListener('click', () => {
          const stock = { code: el.dataset.code, market: parseInt(el.dataset.market), name: el.querySelector('.search-name').textContent };
          Store.selectStock(stock);
          this._dropdown.style.display = 'none';
          this._input.value = '';
          UpdateWatchlistHighlight();
        });
      });
    }
    this._dropdown.style.display = 'block';
  },
};

// ---- 自选股列表 ----
let _watchlistEls = {};

function buildWatchlist() {
  const container = document.getElementById('watchlist');
  container.innerHTML = WATCHLIST.map(s =>
    `<div class="watchlist-item" data-code="${s.code}" id="wl-${s.code}">
      <span class="wl-name">${s.name}</span><span class="wl-code">${s.code}</span>
      <span class="wl-price" id="wlp-${s.code}">--</span>
    </div>`
  ).join('');

  container.querySelectorAll('.watchlist-item').forEach(el => {
    el.addEventListener('click', () => {
      const stock = {
        code: el.dataset.code,
        market: API.detectMarket(el.dataset.code),
        name: el.querySelector('.wl-name').textContent,
      };
      Store.selectStock(stock);
      UpdateWatchlistHighlight();
    });
  });
}

function UpdateWatchlistHighlight() {
  const code = Store.get('stock').code;
  document.querySelectorAll('.watchlist-item').forEach(el => {
    el.classList.toggle('active', el.dataset.code === code);
  });
}

// ---- 行情栏 ----
Store.on('quote', (q) => {
  if (!q) return;
  document.getElementById('qp-price').textContent = q.price != null ? q.price.toFixed(2) : '--';
  const pctEl = document.getElementById('qp-change');
  if (q.changePct != null) {
    const sign = q.changePct >= 0 ? '+' : '';
    pctEl.textContent = `${sign}${q.changePct.toFixed(2)}%`;
    pctEl.className = 'quote-change ' + (q.changePct >= 0 ? 'up' : 'down');
  } else {
    pctEl.textContent = '--';
  }

  const parts = [];
  if (q.open != null) parts.push(`开 ${q.open.toFixed(2)}`);
  if (q.high != null) parts.push(`高 ${q.high.toFixed(2)}`);
  if (q.low != null) parts.push(`低 ${q.low.toFixed(2)}`);
  if (q.prevClose != null) parts.push(`昨收 ${q.prevClose.toFixed(2)}`);
  if (q.amount != null) parts.push(`额 ${(q.amount / 1e8).toFixed(2)}亿`);
  if (q.volume != null) parts.push(`量 ${(q.volume / 1e4).toFixed(0)}万手`);
  if (q.turnover != null) parts.push(`换手 ${q.turnover.toFixed(2)}%`);
  document.getElementById('qp-detail').textContent = parts.join('  ');
});

// ---- 工具栏: 周期 / MA / BB ----
function initToolbar() {
  // 周期按钮
  document.querySelectorAll('.period-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const klt = parseInt(btn.dataset.klt);
      Store.setPeriod(klt);
    });
  });

  // MA 开关
  document.querySelectorAll('.ma-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      const ma = parseInt(chip.dataset.ma);
      const vis = Store.get('visibleMA');
      if (vis.has(ma)) vis.delete(ma); else vis.add(ma);
      chip.classList.toggle('active', vis.has(ma));
      Store.set('visibleMA', new Set(vis));
      refreshChart();
    });
  });

  // 布林带
  document.getElementById('bb-toggle').addEventListener('click', function() {
    const show = !Store.get('showBB');
    Store.set('showBB', show);
    this.classList.toggle('active', show);
    refreshChart();
  });
}

function refreshChart() {
  const data = Store.get('kline');
  const ind = Store.get('indicators');
  if (data.length && ind) {
    ChartManager.update(data, ind, Store.get('visibleMA'), Store.get('showBB'));
  }
}

// ---- 错误横幅 ----
Store.on('error', (err) => {
  const banner = document.getElementById('error-banner');
  if (err) {
    banner.innerHTML = `<span>⚠ ${err}</span><button id="retry-btn">重试</button>`;
    banner.style.display = 'flex';
    document.getElementById('retry-btn').onclick = () => Store.selectStock(Store.get('stock'));
  } else {
    banner.style.display = 'none';
  }
});

// ---- 加载状态 ----
Store.on('loading', (loading) => {
  if (loading) ChartManager.showLoading('加载中…');
  else ChartManager.hideLoading();
});

// ---- 数据到达 → 刷新图表 ----
Store.on('indicators', () => refreshChart());

// ---- 周期变化时更新 UI ----
Store.on('period', (klt) => {
  document.querySelectorAll('.period-btn').forEach(b => {
    b.classList.toggle('active', parseInt(b.dataset.klt) === klt);
  });
});

/* ================================================================
   Section G: 初始化
   ================================================================ */

function init() {
  ChartManager.init();
  buildWatchlist();
  UpdateWatchlistHighlight();
  SearchBox.init();
  initToolbar();
  // 加载默认股票
  Store.selectStock(WATCHLIST[0]);
}

init();

})();
</script>
